name: "SkillGuard"
description: "Static security scanner for AI agent skills and plugins — flags prompt injection, hidden Unicode, exfiltration, and dangerous commands."
author: "SkillGuard contributors"
branding:
  icon: "shield"
  color: "purple"

inputs:
  path:
    description: "File or directory to scan."
    required: false
    default: "."
  fail-on:
    description: "Minimum severity that fails the job (critical|high|medium|low|info)."
    required: false
    default: "high"
  format:
    description: "Output format (text|json|sarif)."
    required: false
    default: "text"
  output:
    description: "Optional file to write the report to (e.g. skillguard.sarif)."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - name: Run SkillGuard
      shell: bash
      run: |
        python -m pip install --quiet "${{ github.action_path }}"
        ARGS=(scan "${{ inputs.path }}" --fail-on "${{ inputs.fail-on }}" --format "${{ inputs.format }}" --no-color)
        if [ -n "${{ inputs.output }}" ]; then
          ARGS+=(--output "${{ inputs.output }}")
        fi
        python -m skillguard "${ARGS[@]}"
